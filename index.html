<!DOCTYPE html>
<html>
<head>
  <title>My First Website</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Momo+Signature&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@201&family=Momo+Signature&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="lace-left">
    <div class="ging-left"></div>
  </div>

  <h1 class="momo-signature-regular" >hello, i'm amy</h1>
  <p class="bio lexend">
    A student interested in mechanical engineering, design, and art.
  </p>

  <div class="status-bar">
  <span class="status-text">status: spring break and contemplation</span>
  </div>

  <!-- Hidden part of bio -->
  <p class="bio lexend" id="extraBio" style="display: none;">
    I enjoy creating origami, exploring nature, and learning new skills online.
  </p>
  <!-- Button to show more -->
  <button id="showBioBtn">Read More</button>
  <img id="bgChangeBtn" src="images/starButton.png" style="position: absolute; top: 70px; right: 420px; width: 60px; height: 60px; cursor: pointer;">
  
   <!-- guestbook popup -->
  <img id="guestbookBtn" src="images/guestbook.png" style="width: 240px; height: 300px; cursor: pointer; position: absolute; top: 70%; left: 300px; transform: rotate(-10deg);">
  <div id="guestbookModal" style="display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); padding:2rem; border-radius:16px; width:90%; max-width:400px; z-index:999;">
    <h2>Guestbook</h2>

    <input id="guestName" type="text" placeholder="your name" style="width:100%; margin:8px 0; padding:8px; border-radius:8px; border:1px solid #ccc;"><br>
    
    <textarea id="guestMessage" placeholder="leave a message..." style="width:100%; margin:8px 0; padding:8px; border-radius:8px; border:1px solid #ccc; height:100px;"></textarea><br>

    <div id="moodPicker" style="font-size:1.5rem; margin:8px 0; cursor:pointer;">
      <span class="mood">👍</span>
      <span class="mood">🍚</span>
      <span class="mood">🔒</span>
      <span class="mood">🫩</span>
      <span class="mood">😊</span>
    </div>

    <button id="submitEntry">Sign Guestbook</button>
    <button id="closeModal">Close</button>

    <div id="entries"></div>
  </div>

  <div id="tamagotchi">
    <a href="https://tamanotchi.world/31588c">
      <img src="https://tamanotchi.world/i/31588" alt="It's tamaNOTchi! Click to feed!" style="width: 30px;">
    </a>
  </div>

  <!-- Link the JavaScript file -->
  <script type="module" src="script.js"></script>
  
</body>

</html>
